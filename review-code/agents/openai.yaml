interface:
  display_name: "Review Code"
  short_description: "Orchestrate risk-routed, multi-lens code review"
  default_prompt: "Use $review-code to review the current diff, following its SKILL.md end to end: establish the change's stated intent, risk-route to the relevant review lenses, run each selected lens as a subagent, refute the important findings independently, and return one consolidated severity-ranked review."
